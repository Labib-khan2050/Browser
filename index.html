<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Neuron Browser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Termbar Sidebar -->
  <div class="termbar">
    <div class="termbar-header">
      <span class="termbar-title">BROWSER</span>
      <button class="new-tab-btn-sidebar" id="newTabSidebar">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-tabs" id="sidebarTabs"></div>
  </div>

  <!-- Main Browser Area -->
  <div class="browser-main">
    <!-- Tab Bar (Chrome-style) -->
    <div class="tab-bar">
      <!-- macOS Traffic Lights -->
      <div class="traffic-lights">
        <button class="traffic-light close" aria-label="Close"></button>
        <button class="traffic-light minimize" aria-label="Minimize"></button>
        <button class="traffic-light maximize" aria-label="Maximize"></button>
      </div>
      
      <div class="tabs-container" id="tabsContainer"></div>
      <button class="new-tab-btn" id="newTabTop">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
      </button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="nav-btn" id="backBtn">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <button class="nav-btn" id="forwardBtn">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
      <button class="nav-btn" id="reloadBtn">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
      <div class="url-bar-container">
        <div class="url-bar">
          <svg class="security-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input type="text" class="url-input" id="urlInput" placeholder="Search or enter address" autocomplete="off" />
        </div>
        <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
